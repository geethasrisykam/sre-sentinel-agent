# Cloud Run service definition for the SRE Sentinel orchestrator.
# Apply with:
#   gcloud run services replace infra/orchestrator/service.yaml \
#     --region=us-central1
#
# Substitute ${PROJECT_ID} and ${IMAGE_TAG} via envsubst or sed before applying;
# Cloud Run does not natively expand env vars inside this manifest.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sre-sentinel-orchestrator
  labels:
    app: sre-sentinel
    component: orchestrator
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # SQLite + WAL only safely supports a single writer. Pin to one
        # instance until we migrate to Firestore (post-hackathon).
        autoscaling.knative.dev/maxScale: "1"
        autoscaling.knative.dev/minScale: "0"
        # Higher CPU-always-on costs money but the agent loop blocks on
        # Gemini network calls; CPU-throttled-when-idle is fine.
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
        # The orchestrator spawns the remediation-mcp as a subprocess and
        # holds long-lived SSE connections; bump container concurrency from
        # the default 80 down to 30 to keep per-instance memory predictable.
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 30
      timeoutSeconds: 300
      serviceAccountName: sre-sentinel-orchestrator@${PROJECT_ID}.iam.gserviceaccount.com
      containers:
        - image: ${IMAGE_TAG}
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: ORCHESTRATOR_LOG_LEVEL
              value: info
            - name: COOKIE_SECURE
              value: "true"
            - name: GEMINI_MODEL
              value: gemini-2.5-flash
            # Secrets pulled from Secret Manager — create them first:
            #   gcloud secrets create gemini-api-key --data-file=-
            #   gcloud secrets create dashboard-session-secret --data-file=-
            #   gcloud secrets create dashboard-demo-password --data-file=-
            #   gcloud secrets create webhook-token --data-file=-
            # And grant the runtime SA roles/secretmanager.secretAccessor.
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
            - name: DASHBOARD_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: dashboard-session-secret
                  key: latest
            - name: DASHBOARD_DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashboard-demo-password
                  key: latest
            - name: WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: webhook-token
                  key: latest
            # Dynatrace secrets — only create+reference once the trial is
            # active. Leaving these unreferenced keeps the orchestrator on
            # the mock diagnosis adapter.
            # - name: DYNATRACE_ENVIRONMENT_URL
            #   valueFrom: { secretKeyRef: { name: dynatrace-env-url, key: latest } }
            # - name: DYNATRACE_API_TOKEN
            #   valueFrom: { secretKeyRef: { name: dynatrace-api-token, key: latest } }
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
